<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doorless House</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="landing-page">

  <div class="landing-layout">

    <!-- ── Left Panel (60%) ── -->
    <div class="panel-left">

      <header class="site-header">
        <img src="logo.png" alt="Doorless House" class="logo-img">
      </header>

      <div class="house-stack">

        <!-- Roof image → Discography -->
        <a href="discography.html" class="house-link">
          <div class="house-img">
            <svg viewBox="0 0 380 256" xmlns="http://www.w3.org/2000/svg">
              <rect width="380" height="256" fill="#DEDAD2"/>
              <line x1="0" y1="0" x2="380" y2="256" stroke="#BEB9B1" stroke-width="1.5"/>
              <line x1="380" y1="0" x2="0" y2="256" stroke="#BEB9B1" stroke-width="1.5"/>
              <text x="190" y="134" text-anchor="middle" fill="#9E9990"
                font-size="11" font-family="sans-serif" letter-spacing="3">ROOF IMAGE</text>
            </svg>
          </div>
        </a>

        <!-- Wall image → Concerts -->
        <a href="concerts.html" class="house-link">
          <div class="house-img">
            <svg viewBox="0 0 380 196" xmlns="http://www.w3.org/2000/svg">
              <rect width="380" height="196" fill="#D6D2CA"/>
              <line x1="0" y1="0" x2="380" y2="196" stroke="#BEB9B1" stroke-width="1.5"/>
              <line x1="380" y1="0" x2="0" y2="196" stroke="#BEB9B1" stroke-width="1.5"/>
              <text x="190" y="104" text-anchor="middle" fill="#9E9990"
                font-size="11" font-family="sans-serif" letter-spacing="3">WALL IMAGE</text>
            </svg>
          </div>
        </a>

      </div>
    </div>

    <!-- ── Right Panel (40%) ── -->
    <div class="panel-right">
      <div class="members-row">

        <div class="member-thumb" data-member="0">
          <div class="member-img-wrap">
            <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
              <rect width="120" height="120" fill="#CECAC3"/>
              <line x1="0" y1="0" x2="120" y2="120" stroke="#B4B0A9" stroke-width="1"/>
              <line x1="120" y1="0" x2="0" y2="120" stroke="#B4B0A9" stroke-width="1"/>
            </svg>
          </div>
        </div>

        <div class="member-thumb" data-member="1">
          <div class="member-img-wrap">
            <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
              <rect width="120" height="120" fill="#C8C4BE"/>
              <line x1="0" y1="0" x2="120" y2="120" stroke="#B4B0A9" stroke-width="1"/>
              <line x1="120" y1="0" x2="0" y2="120" stroke="#B4B0A9" stroke-width="1"/>
            </svg>
          </div>
        </div>

        <div class="member-thumb" data-member="2">
          <div class="member-img-wrap">
            <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
              <rect width="120" height="120" fill="#D2CEC7"/>
              <line x1="0" y1="0" x2="120" y2="120" stroke="#B4B0A9" stroke-width="1"/>
              <line x1="120" y1="0" x2="0" y2="120" stroke="#B4B0A9" stroke-width="1"/>
            </svg>
          </div>
        </div>

        <div class="member-thumb" data-member="3">
          <div class="member-img-wrap">
            <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
              <rect width="120" height="120" fill="#C4C0B9"/>
              <line x1="0" y1="0" x2="120" y2="120" stroke="#B4B0A9" stroke-width="1"/>
              <line x1="120" y1="0" x2="0" y2="120" stroke="#B4B0A9" stroke-width="1"/>
            </svg>
          </div>
        </div>

      </div>
    </div>

  </div>

  <!-- ── Member Modal ── -->
  <div id="member-modal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-label="Member profile">
    <div class="modal-card">
      <button class="modal-close" id="modal-close-btn" aria-label="Close">×</button>
      <div class="modal-inner">
        <div class="modal-photo">
          <svg viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
            <rect width="160" height="160" fill="#CECAC3"/>
            <line x1="0" y1="0" x2="160" y2="160" stroke="#B4B0A9" stroke-width="1"/>
            <line x1="160" y1="0" x2="0" y2="160" stroke="#B4B0A9" stroke-width="1"/>
          </svg>
        </div>
        <div class="modal-text">
          <p class="modal-m-name" id="modal-name"></p>
          <p class="modal-m-role" id="modal-role"></p>
          <p class="modal-m-bio"  id="modal-bio"></p>
        </div>
      </div>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
